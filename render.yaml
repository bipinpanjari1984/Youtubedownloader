services:
  - type: web
    name: youtubedownloader
    env: python
    pythonVersion: 3.11
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m gunicorn web_server:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
